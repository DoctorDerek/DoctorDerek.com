name: Lint Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  lint:
    name: Lint & Annotate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Install Dependencies
        run: pnpm install

      - name: Run Lint and Capture Output
        id: lint
        run: |
          # Run lint and capture output, ignoring the exit code
          OUTPUT=$(pnpm lint || true)
          
          # Write to multiline GitHub environment variable
          echo "LINT_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$OUTPUT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = process.env.LINT_OUTPUT;
            
            // If output is basically just the pnpm success message or empty, skip
            if (!output || output.includes('Done in') && output.trim().split('\n').length <= 2) {
              console.log('No lint warnings to report.');
              return;
            }
            
            const body = `### 🧹 ESLint Warnings Report\n\n\`\`\`text\n${output}\n\`\`\``;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
